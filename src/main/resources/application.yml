spring:
  application:
    name: shipping-estimator

  datasource:
    url: jdbc:h2:mem:shippingdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  web:
    resources:
      add-mappings: false

  mvc:
    throw-exception-if-no-handler-found: true

  cache:
    type: simple

server:
  port: 8080

logging:
  level:
    com.jumbotail.shippingestimator: DEBUG
    org.springframework: INFO
