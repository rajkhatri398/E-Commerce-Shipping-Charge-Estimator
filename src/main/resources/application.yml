# ============================================
# Shipping Estimator - Application Configuration
# ============================================

spring:
  application:
    name: shipping-estimator

  # H2 Database Configuration
  datasource:
    url: jdbc:h2:mem:shippingdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA / Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # H2 Console (for debugging)
  h2:
    console:
      enabled: true
      path: /h2-console

  # Disable static resource handling (API-only service)
  web:
    resources:
      add-mappings: false

  # MVC - throw exception for unmapped endpoints
  mvc:
    throw-exception-if-no-handler-found: true

  # Spring Cache
  cache:
    type: simple

# Server Configuration
server:
  port: 8080

# Logging Configuration
logging:
  level:
    com.jumbotail.shippingestimator: DEBUG
    org.springframework: INFO
